<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/settings.css">

</head>

<body>

<div class="page">

    <!-- =========================
         PAGE HEADER
    ========================== -->

    <div class="page-header">

        <div>

            <h1>Settings</h1>

            <p class="page-subtitle">

                Configure your LiquorStore POS

            </p>

        </div>

    </div>

    <!-- =========================
         DAILY REPORT SETTINGS
    ========================== -->

    <div class="settings-card">

        <h2>📊 Daily Sales Reports</h2>

        <p class="section-description">

            Automatically email the daily sales report to the store manager.

        </p>

        <div class="form-group">

            <label for="manager-email">

                Manager Email Address

            </label>

            <input
                id="manager-email"
                type="email"
                placeholder="manager@example.com">

        </div>

        <div class="form-group">

            <label for="report-time">

                Daily Report Time

            </label>

            <input
                id="report-time"
                type="time"
                value="21:00">

        </div>

        <div class="checkbox-group">

            <input
                id="daily-reports-enabled"
                type="checkbox">

            <label for="daily-reports-enabled">

                Enable Automatic Daily Reports

            </label>

        </div>

        <div class="button-group">

            <button
                id="save-settings-btn"
                class="primary-btn">

                💾 Save Settings

            </button>

            <button
                id="test-email-btn"
                class="secondary-btn">

                📧 Send Test Email

            </button>

        </div>

    </div>

    <!-- =========================
         FUTURE FEATURES
    ========================== -->

    <div class="settings-card disabled">

        <h2>🏪 Business Information</h2>

        <p>

            Coming Soon

        </p>

    </div>

    <div class="settings-card disabled">

        <h2>🧾 Receipt Settings</h2>

        <p>

            Coming Soon

        </p>

    </div>

    <div class="settings-card disabled">

        <h2>💾 Backup & Restore</h2>

        <p>

            Coming Soon

        </p>

    </div>

</div>

<script type="module" src="js/pages/settings.js"></script>

</body>

</html>
