<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <link rel="stylesheet" href="css/products.css">
</head>

<body>

    <div class="products-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2>Categories</h2>
            <!-- HOME BUTTON -->
    <li>
        <a href="index.html" class="home-btn">🏠 Home</a>
    </li>

</ul>

<!-- PRODUCT CATEGORIES -->
<ul id="categoryList"></ul>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- TOP BAR -->
            <div class="top-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button id="backBtn">Back</button>
            </div>

            <!-- PRODUCTS TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Barcode</th>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Size</th>
                            <th>Price</th>
                            <th>Stock</th>
                    
                        </tr>
                    </thead>

                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>

        </main>

    </div>

    <!-- FLOATING CART -->
    <div id="cart" class="cart">

        <!-- DRAG HANDLE -->
       <div id="cart-header" class="cart-header">

    <h3>Cart</h3>

    <button id="clear-cart-btn" class="clear-cart-btn">
        Clear
    </button>

</div>
        <!-- CART TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="cart-body"></tbody>
        </table>

        <!-- CHECKOUT BUTTON -->
        <button id="checkout-btn">Checkout</button>

    </div>

    <!-- SCRIPT -->
    <script type="module" src="js/pages/products.js"></script>

</body>

</html>
