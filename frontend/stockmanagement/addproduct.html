<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <link rel="stylesheet" href="../css/addproduct.css">
</head>
    
<body>

   <div class="form-container">

    <div class="form-header">
        <h1>Add New Product</h1>

        <button id="closeAddProductBtn" class="close-btn">
            Close
        </button>
    </div>

    <form id="add-product-form" class="form">

            <input type="text"
                   id="item-name"
                   placeholder="Product Name"
                   required>

            <input type="text"
                   id="item-size"
                   placeholder="Size (e.g 750ml, 1L, 6 Pack)"
                   required>

            <input type="text"
                   id="barcode"
                   placeholder="Barcode">

           <select id="category" required>
    <option value="">
        Select Category
    </option>
</select>

            <input type="number"
                   id="quantity-in-stock"
                   placeholder="Quantity In Stock"
                   required>

            <input type="number"
                   step="0.01"
                   id="price"
                   placeholder="Selling Price"
                   required>
            <input type="file" id="product-image" 
                accept="image/*">

            <button type="submit">
                Save Product
            </button>

        </form>

    </div>

    <script type="module" src="../js/pages/addproduct.js"></script>

</body>

</html>
