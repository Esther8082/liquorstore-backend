<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <link rel="stylesheet" href="../css/addproduct.css">

</head>
    
<body>

   <div class="form-container">

    <div class="form-header">
        <h1>Add New Product</h1>

        <button id="closeAddProductBtn" class="close-btn">
            Close
        </button>
    </div>

    <h3>Choose Category</h3>

<div id="category-grid" class="category-grid">

    <!-- Categories loaded by JavaScript -->

</div>

<button
    type="button"
    id="new-category-btn"
    class="new-category-btn">

    + Add New Category

</button>

<div class="selected-category">

    Selected Category:

    <span id="selected-category">
        None
    </span>

</div>

    <form id="add-product-form" class="form">

            <input type="text"
                   id="item-name"
                   placeholder="Product Name"
                   required>

            <input type="text"
                   id="item-size"
                   placeholder="Size (e.g 750ml, 1L, 6 Pack)"
                   required>

            <input type="text"
                   id="barcode"
                   placeholder="Barcode">


            <input type="number"
                   id="quantity-in-stock"
                   placeholder="Quantity In Stock"
                   required>

            <input type="number"
                   step="0.01"
                   id="price"
                   placeholder="Selling Price"
                   required>
            <input type="file" id="product-image" 
                accept="image/*">

            <button type="submit">
                Save Product
            </button>

        </form>

    </div>

    <!-- =========================
     ADD CATEGORY MODAL
========================= -->

<div id="category-modal" class="modal">

    <div class="modal-content">

        <h2>Add New Category</h2>

        <input
            type="text"
            id="new-category-name"
            placeholder="Category name">

        <div class="modal-buttons">

            <button
                type="button"
                id="cancel-category-btn">

                Cancel

            </button>

            <button
                type="button"
                id="save-category-btn">

                Save

            </button>

        </div>

    </div>

</div>

    <script type="module" src="../js/pages/addproduct.js"></script>

</body>

</html>
